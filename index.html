<!DOCTYPE html>
<html>
<body>
    <h2>이베이 판매가 계산기</h2>
    <input type="text" id="url" placeholder="상품 URL" style="width:300px;">
    <button onclick="calc()">계산하기</button>
    <div id="result"></div>

    <script>
        async function calc() {
            const url = document.getElementById('url').value;
            const res = await fetch('https://my-ebay-server.onrender.com/api/scrape', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({productUrl: url, cost: 15000})
            });
            const data = await res.json();
            document.getElementById('result').innerText = data.error ? "오류: "+data.error : "결과: "+data.info.name;
        }
    </script>
</body>
</html>

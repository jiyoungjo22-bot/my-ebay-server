<!DOCTYPE html>
<html>
<body>
    <h2>이베이 판매가 계산기</h2>
    <input type="text" id="url" placeholder="상품 URL" style="width:300px;">
    <input type="number" id="cost" value="10000">
    <button onclick="calc()">계산하기</button>
    <button onclick="window.location.href='https://my-ebay-server.onrender.com/api/download'">다운로드</button>
    <div id="result"></div>

    <script>
        async function calc() {
            try {
                const res = await fetch('https://my-ebay-server.onrender.com/api/scrape', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({productUrl: document.getElementById('url').value, cost: document.getElementById('cost').value})
                });
                const data = await res.json();
                if(data.error) alert("오류: " + data.error);
                else document.getElementById('result').innerText = "상품명: " + data.info.name;
            } catch(e) { alert("연결 실패: " + e); }
        }
    </script>
</body>
</html>
